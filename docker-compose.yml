services:
  apk-installer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apk-installer
    ports:
      - "6767:6767"
    env_file:
      - ./config.env
    environment:
      - DEVICE_IP=${DEVICE_IP:-10.10.10.168}
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    network_mode: host
    restart: unless-stopped
    command: uvicorn app:app --host 0.0.0.0 --port 6767 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
